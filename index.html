  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --dark: #0a0a0f;
    --dark2: #12121a;
    --dark3: #1a1a28;
    --text: #e8e8f0;
    --muted: #888899;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Space Grotesk', 'Noto Sans JP', sans-serif;
    overflow-x: hidden;
  }

  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px 20px;
    position: relative;
    background: radial-gradient(ellipse at center, #1a1428 0%, var(--dark) 70%);
  }

  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: 
      radial-gradient(circle at 20% 50%, rgba(201,168,76,0.05) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(201,168,76,0.03) 0%, transparent 40%);
    pointer-events: none;
  }

  .symbol {
    font-size: 80px;
    margin-bottom: 24px;
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.8; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  .hero h1 {
    font-size: clamp(48px, 8vw, 96px);
    font-weight: 700;
    letter-spacing: 0.2em;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .hero .subtitle {
    font-size: clamp(14px, 2vw, 18px);
    letter-spacing: 0.4em;
    color: var(--muted);
    margin-bottom: 48px;
    text-transform: uppercase;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 40px;
    opacity: 0.4;
  }

  .core-phrase {
    font-size: clamp(22px, 4vw, 40px);
    font-weight: 700;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }

  .core-phrase-en {
    font-size: clamp(13px, 2vw, 20px);
    color: var(--muted);
    font-style: italic;
    max-width: 560px;
    line-height: 1.9;
  }

  .crisis {
    padding: 80px 20px;
    background: var(--dark2);
    text-align: center;
  }

  .crisis-label {
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .crisis h2 {
    font-size: clamp(24px, 4vw, 42px);
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text);
  }

  .crisis p {
    color: var(--muted);
    font-size: 16px;
    max-width: 600px;
    margin: 0 auto 60px;
    line-height: 1.8;
  }

  .metrics {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    max-width: 900px;
    margin: 0 auto;
  }

    background: var(--dark3);
    border: 1px solid rgba(201,168,76,0.1);
    border-radius: 12px;
    padding: 28px 32px;
    width: 160px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .metric-card.warning { border-color: rgba(255,180,50,0.3); }
  .metric-card.stable { border-color: rgba(80,200,120,0.3); }

    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;

  .metric-card.warning::before { background: rgba(255,180,50,0.6); }
  .metric-card.stable::before { background: rgba(80,200,120,0.6); }
